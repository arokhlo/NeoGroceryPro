            align-items: flex-start;

            right: -20px;

        .footer-note {
            text-align: center;
            color: #5f82aa;
            margin-top: 35px;
            font-size: 1.2rem;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1f4f82;
            color: white;
            padding: 16px 30px;
            border-radius: 60px;
            font-weight: 600;
            box-shadow: 0 15px 30px #0f3455;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

            // ---------- FUNCTION TO ADD TO HISTORY ----------
            function addToHistory(customerName, cart, discountApplied, dateStr) {
                let history = [];
                try {
                    const stored = localStorage.getItem('invoiceHistory');
                    if (stored) history = JSON.parse(stored);
                } catch (e) {}
                const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
                const discount = discountApplied ? subtotal * 0.1 : 0;
                const total = subtotal - discount;
                const historyItem = {
                    customerName,
                    date: dateStr,
                    total,
                    cart,
                    discountApplied,
                    timestamp: Date.now()
                };
                history.unshift(historyItem);
                if (history.length > 20) history = history.slice(0, 20);
                localStorage.setItem('invoiceHistory', JSON.stringify(history));
            }

            // URL params
            const urlParams = new URLSearchParams(window.location.search);
            const view = urlParams.get('view');
            const container = document.getElementById('appContainer');

            // ---------- INVOICE PAGE ----------
            if (view === 'invoice') {
                const customerName = urlParams.get('name') || 'Guest';
                const date = urlParams.get('date') || new Date().toLocaleDateString('en-GB');
                let cart = [];
                let discountApplied = 0;

                // Try to get from sessionStorage (current invoice)
                try {
                    const current = sessionStorage.getItem('currentInvoice');
                    if (current) {
                        const data = JSON.parse(current);
                        cart = data.cart || [];
                        discountApplied = data.discountApplied || 0;
                        sessionStorage.removeItem('currentInvoice');
                    }
                } catch (e) {}

                // If not found, maybe it's a history view (stored in session by history link)
                if (cart.length === 0) {
                    try {
                        const historyView = sessionStorage.getItem('historyView');
                        if (historyView) {
                            const data = JSON.parse(historyView);
                            cart = data.cart || [];
                            discountApplied = data.discountApplied || 0;
                            sessionStorage.removeItem('historyView');
                        }
                    } catch (e) {}
                }

                let rows = '';
                let subtotal = 0;
                if (cart.length === 0) {
                    rows = '<tr><td colspan="4" style="text-align:center; padding:60px;">No items selected.</td></tr>';
                } else {
                    cart.forEach(item => {
                        const line = item.price * item.qty;
                        subtotal += line;
                        rows += `<tr><td>${item.emoji} ${item.name}</td><td>${item.qty}</td><td>${formatMoney(item.price)}</td><td>${formatMoney(line)}</td></tr>`;
                    });
                }
                const discount = discountApplied ? subtotal * 0.1 : 0;
                const total = subtotal - discount;

                // Build history section
                let historyHtml = '';
                try {
                    const history = JSON.parse(localStorage.getItem('invoiceHistory')) || [];
                    const sameCustomer = history.filter(h => h.customerName.toLowerCase() === customerName.toLowerCase());
                    if (sameCustomer.length > 0) {
                        let links = '';
                        sameCustomer.forEach((item, index) => {
                            links += `<span class="history-link" data-history-index="${index}">${item.date} - ${formatMoney(item.total)}</span>`;
                        });
                        historyHtml = `
                            <div class="history-section">
                                <div class="history-title"><i class="fas fa-history"></i> Previous purchases for ${escapeHtml(customerName)}</div>
                                <div class="history-links" id="historyLinks">
                                    ${links}
                                </div>
                            </div>
                        `;
                    }
                } catch (e) {}

                const invoiceHtml = `
                    <div class="invoice-container">
                        <div class="invoice-header">
                            <div class="invoice-title">🧾 tax invoice</div>
                            <div class="invoice-meta">
                                <p><strong>Customer:</strong> ${escapeHtml(customerName)}</p>
                                <p><strong>Date:</strong> ${escapeHtml(date)}</p>
                            </div>
                        </div>
                        <table class="invoice-table">
                            <thead><tr><th>Item</th><th>Qty</th><th>Unit price</th><th>Total</th></tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                        ${cart.length > 0 ? `
                        <div style="text-align:right; font-size:1.8rem; margin:20px 0;">
                            <div>Subtotal: ${formatMoney(subtotal)}</div>
                            ${discountApplied ? `<div>Discount (10%): -${formatMoney(discount)}</div>` : ''}
                            <div style="font-weight:800; font-size:2.5rem;">Total: ${formatMoney(total)}</div>
                        </div>
                        ` : ''}
                        <div style="background:#e8f2ff; border-radius:80px; padding:22px 35px; margin:40px 0;">
                            <i class="fas fa-university"></i> Store Revolut: <strong>GB29 REVO 0099 1234 5678 90</strong>
                        </div>
                        <div class="print-actions">
                            <button class="print-btn" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
                            <button class="save-btn" id="saveInvoiceBtn"><i class="fas fa-download"></i> Save</button>
                            <a href="?view=" class="back-btn"><i class="fas fa-arrow-left"></i> Continue shopping</a>
                        </div>
                        ${historyHtml}
                    </div>
                `;
                container.innerHTML = invoiceHtml;

                // Save button: download JSON
                document.getElementById('saveInvoiceBtn').addEventListener('click', () => {
                    const invoiceData = {
                        customerName,
                        date,
                        cart,
                        discountApplied,
                        subtotal,
                        discount,
                        total,
                        generatedAt: new Date().toISOString()
                    };
                    const blob = new Blob([JSON.stringify(invoiceData, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `invoice_${customerName}_${date.replace(/\//g, '-')}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast('💾 Invoice saved as JSON');
                });

                // History link clicks
                if (historyHtml) {
                    const history = JSON.parse(localStorage.getItem('invoiceHistory')) || [];
                    const sameCustomer = history.filter(h => h.customerName.toLowerCase() === customerName.toLowerCase());
                    document.querySelectorAll('.history-link').forEach((link, idx) => {
                        link.addEventListener('click', () => {
                            const item = sameCustomer[idx];
                            sessionStorage.setItem('historyView', JSON.stringify({ cart: item.cart, discountApplied: item.discountApplied }));
                            window.location.href = `?view=invoice&name=${encodeURIComponent(item.customerName)}&date=${item.date}`;

                }
                return;

            // ---------- SHOP VIEW ----------
            let cart = [];
            let activeCategory = 'all';
            let searchQuery = '';
            let discountApplied = 0;

            function renderCategories() {
                let html = '';
                categories.forEach(cat => {
                    html += `<div class="cat-pill ${activeCategory === cat.id ? 'active' : ''}" data-cat="${cat.id}"><i class="fas ${cat.icon}"></i> ${cat.label}</div>`;
                });
                document.getElementById('categoryStrip').innerHTML = html;
                document.querySelectorAll('.cat-pill').forEach(pill => {
                    pill.addEventListener('click', () => {
                        activeCategory = pill.dataset.cat;
                        renderCategories();
                        filterAndRenderProducts();
                    });
                });
            }

            function getFilteredProducts() {
                return products.filter(p => {
                    if (activeCategory !== 'all' && p.category !== activeCategory) return false;
                    if (searchQuery && !p.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                    return true;
                });
            }

            function renderProducts() {
                const filtered = getFilteredProducts();
                let gridHtml = '';
                filtered.forEach(prod => {
                    const cartItem = cart.find(c => c.id === prod.id);
                    const qty = cartItem ? cartItem.qty : 0;
                    gridHtml += `
                        <div class="product-card">
                            <div class="product-emoji">${prod.emoji}</div>
                            <div class="product-name">${prod.name}</div>
                            <div class="product-cat-tag"><i class="fa-regular fa-bookmark"></i> ${prod.catName}</div>

                                <span class="product-price">${formatMoney(prod.price)}</span>
                            </div>
                            <div class="qty-selector">
                                <button class="qty-btn dec" data-id="${prod.id}">−</button>
                                <span class="qty-value" id="qty-${prod.id}">${qty}</span>
                                <button class="qty-btn inc" data-id="${prod.id}">+</button>
                            </div>
                        </div>
                    `;
                });
                if (filtered.length === 0) gridHtml = '<div style="text-align:center; padding:60px; background:rgba(255,255,255,0.5); border-radius:90px;">✨ nothing matches, try another category ✨</div>';
                document.getElementById('productsGrid').innerHTML = gridHtml;
                document.querySelectorAll('.inc').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.id;
                        const product = products.find(p => p.id === id);
                        const existing = cart.find(c => c.id === id);
                        if (existing) existing.qty += 1;
                        else cart.push({ id: product.id, name: product.name, emoji: product.emoji, price: product.price, qty: 1, catName: product.catName });
                        document.getElementById(`qty-${id}`).textContent = existing ? existing.qty : 1;
                        renderCart();
                        updateCartBadge();
                        showToast(`➕ ${product.name} added`);
                    });
                });
                document.querySelectorAll('.dec').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.id;
                        const index = cart.findIndex(c => c.id === id);
                        if (index !== -1) {
                            if (cart[index].qty > 1) {
                                cart[index].qty -= 1;
                                document.getElementById(`qty-${id}`).textContent = cart[index].qty;
                            } else {
                                cart.splice(index, 1);
                                document.getElementById(`qty-${id}`).textContent = '0';
                            }
                            renderCart();
                            updateCartBadge();
                        }
                    });
                });
            }

            function filterAndRenderProducts() { renderProducts(); }

            function renderCart() {
                const cartContainer = document.getElementById('cartItems');
                const subtotalSpan = document.getElementById('subtotalValue');
                const discountSpan = document.getElementById('discountValue');
                const totalSpan = document.getElementById('totalAfterDiscount');
                if (!cartContainer) return;
                let subtotal = 0;
                if (cart.length === 0) {
                    cartContainer.innerHTML = '<div style="text-align:center; color:#789fc7; padding:35px;">your cart is empty ✨</div>';
                } else {
                    let html = '';
                    cart.forEach((item, idx) => {
                        const line = item.price * item.qty;
                        subtotal += line;
                        html += `
                            <div class="cart-item">
                                <div class="cart-item-left">
                                    <span>${item.emoji}</span>
                                    <span class="cart-item-name">${item.name}</span>
                                    <div class="cart-item-controls">
                                        <button class="cart-dec" data-index="${idx}">−</button>
                                        <span class="cart-item-qty">${item.qty}</span>
                                        <button class="cart-inc" data-index="${idx}">+</button>
                                    </div>
                                </div>
                                <div style="display:flex; align-items:center; gap:10px;">
                                    <span class="cart-item-price">${formatMoney(line)}</span>
                                    <button class="remove-item" data-index="${idx}"><i class="fas fa-trash-can"></i></button>
                                </div>
                            </div>
                        `;
                    });
                    cartContainer.innerHTML = html;
                }
                subtotalSpan.textContent = formatMoney(subtotal);
                let discount = discountApplied ? subtotal * 0.1 : 0;
                discountSpan.textContent = '-' + formatMoney(discount);
                totalSpan.textContent = formatMoney(subtotal - discount);

                document.querySelectorAll('.cart-inc').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const idx = btn.dataset.index;
                        cart[idx].qty += 1;
                        syncQtyFromCart(cart[idx].id);
                        renderCart();
                        updateCartBadge();
                    });
                });
                document.querySelectorAll('.cart-dec').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const idx = btn.dataset.index;
                        if (cart[idx].qty > 1) {
                            cart[idx].qty -= 1;
                        } else {
                            const removedId = cart[idx].id;
                            cart.splice(idx, 1);
                            document.getElementById(`qty-${removedId}`).textContent = '0';
                        }
                        syncQtyFromCart(cart[idx]?.id);
                        renderCart();
                        updateCartBadge();
                    });
                });
                document.querySelectorAll('.remove-item').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const idx = btn.dataset.index;
                        const removedId = cart[idx].id;
                        cart.splice(idx, 1);
                        const qtySpan = document.getElementById(`qty-${removedId}`);
                        if (qtySpan) qtySpan.textContent = '0';
                        renderCart();
                        updateCartBadge();
                    });
                });
            }

            function syncQtyFromCart(productId) {
                if (!productId) return;
                const item = cart.find(c => c.id === productId);
                const span = document.getElementById(`qty-${productId}`);
                if (span) span.textContent = item ? item.qty : 0;
            }

            function updateCartBadge() {
                const count = cart.reduce((acc, i) => acc + i.qty, 0);
                document.getElementById('cartItemCount').textContent = count;
            }

            // Shared function to generate invoice
            function generateInvoice() {
                const name = document.getElementById('customerName').value.trim();
                if (!name) { alert('Please enter customer name'); return; }
                if (cart.length === 0) { alert('Cart is empty'); return; }

                // Store in sessionStorage for invoice page
                const data = { cart, discountApplied };
                sessionStorage.setItem('currentInvoice', JSON.stringify(data));

                // Add to history
                const today = new Date();
                const dateStr = today.getFullYear()+'-'+(today.getMonth()+1).toString().padStart(2,'0')+'-'+today.getDate().toString().padStart(2,'0');
                addToHistory(name, cart, discountApplied, dateStr);

                window.location.href = `?view=invoice&name=${encodeURIComponent(name)}&date=${dateStr}`;
            }

            // Build main shop UI
            const shopHtml = `
                <div class="header">
                    <div class="brand">
                        <i class="fas fa-bag-shopping brand-icon"></i>
                        <span class="brand-name">NeoGrocery Pro</span>
                    </div>
                    <div class="search-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search 175+ products..." value="">
                        <button id="searchBtn"><i class="fas fa-arrow-right-long"></i></button>
                    </div>
                    <div class="cart-badge" id="cartBadge">
                        <i class="fas fa-cart-shopping"></i>
                        <span id="cartItemCount">0</span>
                    </div>
                </div>

                <div class="category-strip" id="categoryStrip"></div>

                <div class="main-panel">
                    <div class="products-grid" id="productsGrid"></div>
                    <div class="cart-panel">
                        <div class="cart-header">
                            <div class="cart-title"><i class="fas fa-basket-shopping"></i> your cart</div>
                            <button class="clear-cart" id="clearCartBtn"><i class="fas fa-trash-alt"></i> clear</button>
                        </div>
                        <div class="cart-items" id="cartItems"></div>
                        <div class="discount-row">
                            <input type="text" id="discountInput" placeholder="Promo code (SAVE10)">
                            <button id="applyDiscount">Apply</button>
                        </div>
                        <div class="subtotal">
                            <span>Subtotal</span>
                            <span id="subtotalValue">£0.00</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:1.4rem; margin:5px 0; color:#1e4e7a;">
                            <span>Discount</span>
                            <span id="discountValue">-£0.00</span>
                        </div>
                        <div class="total-line">
                            <span>Total</span>
                            <span id="totalAfterDiscount">£0.00</span>
                        </div>

                        <div class="customer-field">
                            <label><i class="fas fa-user"></i> Customer name</label>
                            <input type="text" id="customerName" placeholder="e.g. Taylor Chen">
                        </div>

                        <div class="payment-details">
                            <div style="font-weight:700; margin-bottom:20px;">💳 payment details</div>
                            <div class="payment-row">
                                <div class="payment-field"><label>Account number</label><input id="accNumber" placeholder="12345678"></div>
                                <div class="payment-field"><label>Sort code</label><input id="sortCode" placeholder="12-34-56"></div>
                            </div>
                            <div class="payment-row">
                                <div class="payment-field"><label>Expiry (MM/YY)</label><input id="expiry" placeholder="12/25"></div>
                                <div class="payment-field"><label>CVV</label><input id="cvv" placeholder="123" maxlength="3"></div>
                            </div>
                            <div class="bank-group">
                                <label class="bank-option"><input type="radio" name="bank" value="Halifax" checked> Halifax</label>
                                <label class="bank-option"><input type="radio" name="bank" value="LLOYDS"> Lloyds</label>
                                <label class="bank-option"><input type="radio" name="bank" value="Revolut"> Revolut</label>
                            </div>
                        </div>

                        <div class="revolut-note">
                            <i class="fas fa-building-columns"></i> Store Revolut: <strong>GB29 REVO 0099 1234 5678 90</strong>
                        </div>

                        <div class="action-buttons">
                            <button class="btn btn-primary" id="generateInvoiceBtn"><i class="fas fa-file-invoice"></i> pre‑invoice</button>
                            <button class="btn btn-secondary" id="simulatePaymentBtn"><i class="fas fa-circle-check"></i> pay now</button>
                        </div>
                    </div>
                </div>
                <div class="footer-note">✦ 175+ products · discount on invoice · Save as JSON ✦</div>
            `;
            container.innerHTML = shopHtml;

            renderCategories();
            renderProducts();
            renderCart();
            updateCartBadge();

            document.getElementById('searchBtn').addEventListener('click', () => {
                searchQuery = document.getElementById('searchInput').value;
                renderProducts();
            });
            document.getElementById('searchInput').addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    searchQuery = e.target.value;
                    renderProducts();
                }
            });

            document.getElementById('clearCartBtn').addEventListener('click', () => {
                cart = [];
                products.forEach(p => {
                    const span = document.getElementById(`qty-${p.id}`);
                    if (span) span.textContent = '0';
                });
                renderCart();
                updateCartBadge();
                showToast('🧹 Cart cleared');
            });

            document.getElementById('applyDiscount').addEventListener('click', () => {
                const code = document.getElementById('discountInput').value.trim();
                if (code.toUpperCase() === 'SAVE10') {
                    discountApplied = 0.1;
                    showToast('✅ 10% discount applied!');
                } else {
                    discountApplied = 0;
                    showToast('❌ Invalid code');
                }
                renderCart();
            });

            // Generate invoice from button
            document.getElementById('generateInvoiceBtn').addEventListener('click', generateInvoice);

            // Generate invoice from cart icon
            document.getElementById('cartBadge').addEventListener('click', generateInvoice);

            document.getElementById('simulatePaymentBtn').addEventListener('click', () => {
                const name = document.getElementById('customerName').value.trim();
                if (!name) { alert('Enter name'); return; }
                if (cart.length === 0) { alert('Cart empty'); return; }
                const acc = document.getElementById('accNumber').value.trim();
                const sort = document.getElementById('sortCode').value.trim();
                const expiry = document.getElementById('expiry').value.trim();
                const cvv = document.getElementById('cvv').value.trim();
                if (!acc || !sort || !expiry || !cvv) { alert('Fill all payment fields'); return; }
                if (!/^\d{6,}$/.test(acc.replace(/\s/g, ''))) { alert('Account number must be at least 6 digits'); return; }
                if (sort.replace(/\D/g, '').length !== 6) { alert('Sort code must be 6 digits'); return; }
                if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiry)) { alert('Expiry must be MM/YY'); return; }
                if (!/^\d{3}$/.test(cvv)) { alert('CVV must be 3 digits'); return; }
                const bank = document.querySelector('input[name="bank"]:checked')?.value || 'Halifax';
                const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
                const discount = discountApplied ? subtotal * 0.1 : 0;
                const total = subtotal - discount;
                alert(`✅ Payment simulated via ${bank}\nCustomer: ${name}\nTotal: ${formatMoney(total)}\nTransferred to store's Revolut: GB29 REVO 0099 1234 5678 90`);
                showToast('💸 Payment successful (demo)');
            });
        })();
    </script>
</body>
</html>
