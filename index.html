        }

            color: #0f3a5e;
            filter: drop-shadow(0 8px 12px #aaccff);
            animation: float 4s infinite;
        }

            0% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0); }
        }
        .brand-name {
            font-weight: 800;
            font-size: 1.9rem;

            -webkit-text-fill-color: transparent;
        }

            background: white;
            border-radius: 60px;

            outline: none;
            padding: 12px 8px;
            background: transparent;
        }
        .search-wrapper button {
            background: #0f3a5e;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            white-space: nowrap;
        }

            border-radius: 60px;
            padding: 12px 22px;
            box-shadow: 0 15px 25px rgba(0,35,70,0.15);
            border: 1px solid #dae9ff;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .cart-badge i { color: #1f5282; font-size: 1.8rem; }
        .cart-count {
            background: #fb5;
            color: #1e2f40;
            border-radius: 40px;
            padding: 2px 10px;
            font-size: 0.9rem;
            position: absolute;
            top: -8px;
            right: -6px;
            border: 2px solid white;
            font-weight: 700;
        }
        .cat-pill {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(4px);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            border: 1px solid rgba(90,150,230,0.3);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #1c4468;
        }
        .cat-pill.active {
            background: #0f3a5e;
            color: white;
            border-color: transparent;
            box-shadow: 0 12px 22px #0f3a60;
        }
        .product-card {

            backdrop-filter: blur(8px);

            box-shadow: 0 15px 30px rgba(0,40,70,0.1);

            border: 1px solid rgba(255,255,255,0.9);
            height: 100%;
            display: flex;
            flex-direction: column;

        .product-emoji { font-size: 3.8rem; line-height: 1; }
        .product-name { font-weight: 700; font-size: 1.2rem; color: #103a5e; }
        .product-cat-tag {
            font-size: 0.75rem;
            background: #e6f0ff;
            padding: 4px 14px;
            border-radius: 40px;
            margin: 8px 0;
            display: inline-block;

        .product-price { font-weight: 800; font-size: 1.7rem; color: #0b3d66; }
        .qty-btn {
            background: white;
            border: 1px solid #c4deff;
            width: 44px;
            height: 44px;
            border-radius: 50px;
            font-size: 2rem;
            font-weight: 600;
            color: #1f4f82;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 12px rgba(0,40,80,0.1);
        }
        .qty-btn:active { background: #fb5; color: #1e2f40; }
        .qty-value { font-weight: 700; font-size: 1.8rem; min-width: 40px; text-align: center; }
        .cart-panel {
            background: rgba(255,255,255,0.75);

            padding: 24px 20px;
            border: 1px solid rgba(255,255,255,0.7);

            align-items: center;
            justify-content: space-between;

            font-weight: 600;

                            <label class="fw-semibold mb-1">CVV</label>

                        </div>
                    </div>
                    <div class="d-flex gap-4 mb-4">
                        <label class="d-flex align-items-center gap-2"><input type="radio" name="modalBank" value="Halifax" checked> Halifax</label>
                        <label class="d-flex align-items-center gap-2"><input type="radio" name="modalBank" value="Revolut"> Revolut</label>
                    </div>
                    <div class="revolut-note mb-3">
                        <i class="bi bi-bank2"></i> Store Revolut: <strong>GB29 REVO 0099 1234 5678 90</strong>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-outline-custom flex-fill" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary-custom flex-fill" id="confirmPaymentBtn">Pay now</button>
                </div>
            </div>
        </div>
    </div>

            function escapeHtml(unsafe) { return unsafe.replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

            // History
            function addToHistory(customerName, cart, discountApplied, dateStr) {
                let history = [];
                try { const stored = localStorage.getItem('invoiceHistory'); if (stored) history = JSON.parse(stored); } catch (e) {}
                const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);

            // ---------- SAVED INVOICES (24h storage with versioning) ----------
            const SAVED_INVOICES_KEY = 'savedInvoices';
            
            function generateUniqueFileName(baseName, existingFiles) {
                // baseName example: invoice_Guest_2026-03-08.json
                const extIndex = baseName.lastIndexOf('.json');
                const namePart = baseName.substring(0, extIndex);
                
                // Check if baseName exists
                if (!existingFiles.includes(baseName)) {
                    return baseName;
                }
                
                // Find the highest version number
                let maxVersion = 0;
                const pattern = new RegExp(`^${namePart.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}-(\\d+)\\.json$`);
                
                existingFiles.forEach(file => {
                    const match = file.match(pattern);
                    if (match) {
                        const version = parseInt(match[1], 10);
                        if (version > maxVersion) maxVersion = version;
                    }
                });
                
                // If baseName exists but no numbered versions yet, start with -1
                if (existingFiles.includes(baseName) && maxVersion === 0) {
                    return `${namePart}-1.json`;
                }
                
                // Otherwise increment the highest version
                return `${namePart}-${maxVersion + 1}.json`;
            }
            
            function saveInvoiceFor24h(invoiceData, desiredFileName) {
                const saved = getAllSavedInvoices();
                const existingFileNames = saved.map(item => item.fileName);
                
                // Generate unique filename
                const uniqueFileName = generateUniqueFileName(desiredFileName, existingFileNames);
                
                const expires = Date.now() + 24 * 60 * 60 * 1000; // 24 hours
                saved.push({
                    fileName: uniqueFileName,
                    data: invoiceData,
                    expires: expires,
                    timestamp: Date.now()
                });
                
                // Clean expired ones
                const valid = saved.filter(item => item.expires > Date.now());
                localStorage.setItem(SAVED_INVOICES_KEY, JSON.stringify(valid));
                return uniqueFileName;
            }
            
            function getAllSavedInvoices() {
                try {
                    const saved = localStorage.getItem(SAVED_INVOICES_KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        // Filter out expired
                        const valid = parsed.filter(item => item.expires > Date.now());
                        if (valid.length !== parsed.length) {
                            localStorage.setItem(SAVED_INVOICES_KEY, JSON.stringify(valid));
                        }
                        return valid;
                    }
                } catch (e) {}
                return [];
            }
            
            function getSavedInvoiceByFileName(fileName) {
                const saved = getAllSavedInvoices();
                return saved.find(item => item.fileName === fileName);
            }

                    </div>
                `;
                container.innerHTML = invoiceHtml;

                // Save button: store in localStorage for 24h with versioned filename
                document.getElementById('saveInvoiceBtn')?.addEventListener('click', () => {
                    const invoiceData = {

                    showToast(`✅ Invoice saved as: ${uniqueFileName}`);

            // ---------- SHOP VIEW (no customer name field, only cart) ----------
            let cart = [];

                let html = '';

                    return true;

            function renderProducts() {
                const filtered = getFilteredProducts();

            function attachProductEvents() {
                document.querySelectorAll('.inc').forEach(btn => {
                    btn.addEventListener('click', () => {

                        const existing = cart.find(c => c.id === id);
                        if (existing) existing.qty += 1;
                        else cart.push({ id: product.id, name: product.name, emoji: product.emoji, price: product.price, qty: 1, catName: product.catName });
                        document.getElementById(`qty-${id}`).textContent = existing ? existing.qty : 1;
                        renderCart();
                        updateCartBadge();
                        showToast(`➕ ${product.name}`);
                    });
                });
                document.querySelectorAll('.dec').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.id;
                        const index = cart.findIndex(c => c.id === id);
                        if (index !== -1) {
                            if (cart[index].qty > 1) { cart[index].qty -= 1; document.getElementById(`qty-${id}`).textContent = cart[index].qty; }
                            else { cart.splice(index, 1); document.getElementById(`qty-${id}`).textContent = '0'; }
                            renderCart();
                            updateCartBadge();
                        }
                    });
                });

            document.getElementById('searchBtn').addEventListener('click', () => { searchQuery = document.getElementById('searchInput').value; renderProducts(); });
            document.getElementById('searchInput').addEventListener('keyup', (e) => { if (e.key === 'Enter') { searchQuery = e.target.value; renderProducts(); } });
            document.getElementById('clearCartBtn').addEventListener('click', () => { cart = []; products.forEach(p => { const span = document.getElementById(`qty-${p.id}`); if (span) span.textContent = '0'; }); renderCart(); updateCartBadge(); showToast('🧹 Cart cleared'); });
            document.getElementById('applyDiscount').addEventListener('click', () => {
                const code = document.getElementById('discountInput').value.trim();
                if (code.toUpperCase() === 'SAVE10') { discountApplied = 0.1; showToast('✅ 10% discount applied!'); } else { discountApplied = 0; showToast('❌ Invalid code'); }
                renderCart();
            });
            document.getElementById('generateInvoiceBtn').addEventListener('click', generateInvoice);
            document.getElementById('cartBadge').addEventListener('click', generateInvoice);

            // Payment modal confirmation
            document.getElementById('confirmPaymentBtn')?.addEventListener('click', () => {
                const name = document.getElementById('modalCustomerName').value.trim();
                if (!name) { alert('Please enter customer name'); return; }
                const acc = document.getElementById('modalAccNumber').value.trim();
                const sort = document.getElementById('modalSortCode').value.trim();
                const expiry = document.getElementById('modalExpiry').value.trim();
                const cvv = document.getElementById('modalCvv').value.trim();
                if (!acc || !sort || !expiry || !cvv) { alert('Fill all payment fields'); return; }
                if (!/^\d{6,}$/.test(acc.replace(/\s/g, ''))) { alert('Account number must be at least 6 digits'); return; }
                if (sort.replace(/\D/g, '').length !== 6) { alert('Sort code must be 6 digits'); return; }
                if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiry)) { alert('Expiry must be MM/YY'); return; }
                if (!/^\d{3}$/.test(cvv)) { alert('CVV must be 3 digits'); return; }
                const bank = document.querySelector('input[name="modalBank"]:checked')?.value || 'Halifax';
                
                // Update customer name on invoice if still on invoice page
                const nameSpan = document.getElementById('invoiceCustomerName');
                if (nameSpan) nameSpan.textContent = name;
                
                // Close modal
                const modalEl = document.getElementById('paymentModal');
                const modal = bootstrap.Modal.getInstance(modalEl);
                modal.hide();
                
                showToast(`💸 Payment successful via ${bank} · Customer: ${name}`);
            });
        })();
    </script>
</body>
</html>
